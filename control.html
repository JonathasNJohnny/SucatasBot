<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Controle Gacha</title>
    <style>
      /* Navbar Styles */
      .navbar {
        background: rgba(11, 16, 32, 0.95);
        border-bottom: 2px solid #2a365f;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      .navbar-brand {
        font-size: 1.3rem;
        font-weight: bold;
        background: linear-gradient(135deg, #3ad88f 0%, #60f0ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .navbar-links {
        display: flex;
        gap: 1.5rem;
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .navbar-links a {
        color: #9aa6d1;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
      }
      .navbar-links a:hover {
        color: #3ad88f;
      }
      .navbar-links a.active {
        color: #3ad88f;
        border-bottom: 2px solid #3ad88f;
        padding-bottom: 0.5rem;
      }
    </style>
  </head>
  <script>
    const channel = new BroadcastChannel("gacha_channel");
    const socket = new WebSocket("ws://localhost:3001");
  </script>
  <body
    style="
      background: #0f172a;
      color: white;
      font-family: sans-serif;
      text-align: center;
      margin: 0;
    "
  >
    <nav class="navbar">
      <div class="navbar-brand">Lizah</div>
      <ul class="navbar-links">
        <li><a href="/importItems.html">ImportItems</a></li>
        <li><a href="/control.html" class="active">Controle</a></li>
        <li><a href="/twitchControl.html">Twitch</a></li>
        <li><a href="/overlay.html" target="_blank">Overlay</a></li>
      </ul>
    </nav>
    <h1>🎮 Controle Gacha</h1>

    <p>Itens recebidos da aba ImportItems</p>

    <br /><br />

    <button onclick="playGacha()">▶ PLAY</button>

    <div id="list"></div>

    <script>
      const items = [];

      async function loadItems() {
        try {
          const res = await fetch("/api/items");
          const data = await res.json();

          if (!res.ok || !data.ok || !Array.isArray(data.items)) {
            throw new Error(data.message || "Falha ao carregar itens");
          }

          items.splice(0, items.length, ...data.items);
          render();
        } catch (err) {
          document.getElementById("list").innerHTML =
            'Erro ao carregar itens. Use a aba <a href="/importItems.html">ImportItems</a> para importar.';
          console.error(err);
        }
      }

      function render() {
        document.getElementById("list").innerHTML = items
          .map((i) => `${i.name} (${i.chance}%)`)
          .join("<br>");
      }

      function getRandomItem() {
        const total = items.reduce((a, b) => a + b.chance, 0);
        const rand = Math.random() * total;
        let acc = 0;
        for (let i of items) {
          acc += i.chance;
          if (rand <= acc) return i;
        }

        return items[items.length - 1];
      }

      function playGacha() {
        if (!items.length) {
          alert(
            "Nenhum item importado. Va para ImportItems e importe primeiro.",
          );
          return;
        }

        const item = getRandomItem();

        if (!item) {
          alert("Nenhum item carregado da ImportItems");
          return;
        }

        if (socket.readyState !== WebSocket.OPEN) {
          alert(
            "WebSocket desconectado. Verifique se o server.js está rodando.",
          );
          return;
        }

        socket.send(
          JSON.stringify({
            type: "gacha",
            item,
          }),
        );
      }

      loadItems();
    </script>
  </body>
</html>
