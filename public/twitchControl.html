<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Control</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #131a2e;
        --line: #2a365f;
        --text: #f5f7ff;
        --muted: #9aa6d1;
        --ok: #3ad88f;
        --warn: #ffcc66;
        --danger: #ff6b6b;
      }

      /* Navbar Styles */
      .navbar {
        background: rgba(11, 16, 32, 0.95);
        border-bottom: 2px solid #2a365f;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      .navbar-brand {
        font-size: 1.3rem;
        font-weight: bold;
        background: linear-gradient(135deg, #3ad88f 0%, #60f0ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .navbar-links {
        display: flex;
        gap: 1.5rem;
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .navbar-links a {
        color: #9aa6d1;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
      }
      .navbar-links a:hover {
        color: #3ad88f;
      }
      .navbar-links a.active {
        color: #3ad88f;
        border-bottom: 2px solid #3ad88f;
        padding-bottom: 0.5rem;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: radial-gradient(
          circle at 20% 0%,
          #1c2850 0%,
          var(--bg) 45%
        );
        color: var(--text);
        font-family:
          Segoe UI,
          Tahoma,
          Geneva,
          Verdana,
          sans-serif;
      }

      .wrap {
        margin-top: 2rem;
        max-width: 820px;
        margin: 36px auto;
        padding: 0 16px;
      }

      .panel {
        background: linear-gradient(180deg, #1a2340 0%, var(--panel) 100%);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 16px;
        font-size: 28px;
      }

      p {
        margin: 6px 0 20px;
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
      }

      @media (min-width: 760px) {
        .grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      label {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        background: #0f1530;
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        outline: none;
      }

      .reward-progress-wrap {
        margin-top: 8px;
      }

      .reward-progress-bar {
        width: 100%;
        height: 8px;
        background: #0d1226;
        border: 1px solid var(--line);
        border-radius: 999px;
        overflow: hidden;
      }

      .reward-progress-fill {
        width: 0%;
        height: 100%;
        background: linear-gradient(90deg, #3ad88f 0%, #60f0ff 100%);
        transition: width 0.09s linear;
      }

      .reward-progress-text {
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      .switch-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 2px;
      }

      .switch {
        position: relative;
        width: 56px;
        height: 30px;
        display: inline-block;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
        position: absolute;
      }

      .slider {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: #5a647f;
        border: 1px solid var(--line);
        transition: all 0.2s ease;
        cursor: pointer;
      }

      .slider::before {
        content: "";
        position: absolute;
        width: 24px;
        height: 24px;
        left: 2px;
        top: 2px;
        border-radius: 50%;
        background: #f5f7ff;
        transition: transform 0.2s ease;
      }

      .switch input:checked + .slider {
        background: #2a9d6f;
      }

      .switch input:checked + .slider::before {
        transform: translateX(26px);
      }

      .switch-state {
        font-size: 13px;
        color: var(--muted);
        min-width: 90px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }

      .btn-start {
        background: #2a9d6f;
      }

      .btn-stop {
        background: #b34a4a;
      }

      .btn-test {
        background: #3b5dcc;
      }

      .status {
        margin-top: 18px;
        padding: 12px;
        border-radius: 10px;
        background: #0f1530;
        border: 1px solid var(--line);
      }

      .ok {
        color: var(--ok);
      }

      .warn {
        color: var(--warn);
      }

      .danger {
        color: var(--danger);
      }

      pre {
        margin: 10px 0 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: #c6d0ff;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-brand">Sucatas Bot</div>
      <ul class="navbar-links">
        <li><a href="/importItems.html">Importações de Itens</a></li>
        <li><a href="/twitchControl.html" class="active">Twitch</a></li>
        <li><a href="/overlay.html" target="_blank">Overlay</a></li>
      </ul>
    </nav>
    <main class="wrap">
      <section class="panel">
        <h1>Twitch Control</h1>
        <p>Link para OBS: http://localhost:49382/overlay.html</p>

        <div class="grid">
          <div>
            <label for="broadcasterId">Broadcaster ID</label>
            <input
              id="broadcasterId"
              placeholder="Conecte com a Twitch para preencher"
              readonly
            />
          </div>
          <div>
            <label for="channelName">Canal</label>
            <input
              id="channelName"
              placeholder="Conecte com a Twitch"
              readonly
            />
          </div>
          <div>
            <label for="rewardName">Nome do resgate</label>
            <input id="rewardName" value="-" />
            <div class="reward-progress-wrap">
              <div class="reward-progress-bar">
                <div class="reward-progress-fill" id="rewardProgressFill"></div>
              </div>
              <div class="reward-progress-text" id="rewardProgressText">
                Digite para agendar atualizacao em 10s
              </div>
            </div>
          </div>
          <div>
            <label for="rewardCost">Pontos do resgate</label>
            <input id="rewardCost" type="number" min="1" step="1" value="1" />
          </div>
          <div>
            <label for="rewardColor">Cor do resgate</label>
            <input id="rewardColor" type="color" value="#9147ff" />
          </div>
          <div>
            <label for="rewardEnabled">Status do resgate</label>
            <div class="switch-row">
              <label class="switch" aria-label="Ativar ou desativar resgate">
                <input id="rewardEnabled" type="checkbox" checked />
                <span class="slider"></span>
              </label>
              <span class="switch-state" id="rewardEnabledText">ON</span>
            </div>
          </div>
          <div>
            <label for="pollIntervalMs">Intervalo de consulta</label>
            <input id="pollIntervalMs" value="1000 ms" readonly />
          </div>
        </div>

        <div class="actions">
          <button class="btn-test" id="btnConnect">Conectar Twitch</button>
          <button class="btn-start" id="btnStartStop">Iniciar monitor</button>
          <button class="btn-test" id="btnTest">Teste de gatilho</button>
          <button class="btn-stop" id="btnLogout">Sair</button>
        </div>

        <div class="status" id="statusBox">
          <div id="statusLine" class="warn">Carregando status...</div>
          <pre id="statusRaw"></pre>
        </div>
      </section>
    </main>

    <script>
      const statusLine = document.getElementById("statusLine");
      const statusRaw = document.getElementById("statusRaw");
      const btnStartStop = document.getElementById("btnStartStop");
      const rewardNameInput = document.getElementById("rewardName");
      const rewardCostInput = document.getElementById("rewardCost");
      const rewardColorInput = document.getElementById("rewardColor");
      const rewardEnabledInput = document.getElementById("rewardEnabled");
      const rewardEnabledText = document.getElementById("rewardEnabledText");
      const rewardProgressFill = document.getElementById("rewardProgressFill");
      const rewardProgressText = document.getElementById("rewardProgressText");

      const REWARD_APPLY_DELAY_MS = 10000;
      let rewardApplyTimeoutId = null;
      let rewardProgressIntervalId = null;
      let rewardCountdownStartedAt = 0;
      let rewardEditInProgress = false;
      let rewardToggleInProgress = false;

      function setStatus(text, cls) {
        statusLine.className = cls;
        statusLine.textContent = text;
      }

      function getPayload() {
        return {
          broadcasterId: document.getElementById("broadcasterId").value.trim(),
          rewardName: rewardNameInput.value.trim(),
          rewardCost: rewardCostInput.value,
          rewardColor: rewardColorInput.value,
          rewardEnabled: rewardEnabledInput.checked,
        };
      }

      function setRewardEnabledUi(enabled) {
        rewardEnabledInput.checked = Boolean(enabled);
        rewardEnabledText.textContent = enabled ? "ON" : "OFF";
      }

      function fillFormFromStatus(status) {
        if (!status) return;

        if (status.auth && status.auth.broadcasterId) {
          document.getElementById("broadcasterId").value =
            status.auth.broadcasterId;
          document.getElementById("channelName").value =
            status.auth.displayName || status.auth.login || "";
        } else {
          document.getElementById("broadcasterId").value = "";
          document.getElementById("channelName").value = "";
        }

        if (!rewardEditInProgress) {
          rewardNameInput.value = status.redemptionName || "-";
          rewardCostInput.value = String(status.rewardCost || 1);
          rewardColorInput.value = status.rewardColor || "#9147ff";
          if (!rewardToggleInProgress) {
            setRewardEnabledUi(Boolean(status.rewardEnabled));
          }
        }
        document.getElementById("pollIntervalMs").value =
          `${status.pollIntervalMs || 1000} ms`;
      }

      function clearRewardTimers() {
        if (rewardApplyTimeoutId) {
          clearTimeout(rewardApplyTimeoutId);
          rewardApplyTimeoutId = null;
        }

        if (rewardProgressIntervalId) {
          clearInterval(rewardProgressIntervalId);
          rewardProgressIntervalId = null;
        }
      }

      function renderRewardProgress(percent, text) {
        const clamped = Math.max(0, Math.min(100, percent));
        rewardProgressFill.style.width = `${clamped}%`;
        rewardProgressText.textContent = text;
      }

      async function applyRewardNameChange() {
        clearRewardTimers();

        const rewardName = rewardNameInput.value.trim();
        const rewardCost = rewardCostInput.value;
        const rewardColor = rewardColorInput.value;
        const rewardEnabled = rewardEnabledInput.checked;
        if (!rewardName || rewardName === "-") {
          renderRewardProgress(0, "Digite um nome valido para o resgate");
          rewardEditInProgress = false;
          return;
        }

        try {
          renderRewardProgress(100, "Aplicando novo resgate...");
          await postJson("/api/twitch/reward-config", {
            rewardName,
            rewardCost,
            rewardColor,
            rewardEnabled,
          });
          setStatus("Resgate atualizado: nome, pontos e cor aplicados", "ok");
          rewardEditInProgress = false;
          renderRewardProgress(
            0,
            "Atualizado. Digite para agendar nova alteracao",
          );
          await refreshStatus();
        } catch (err) {
          rewardEditInProgress = false;
          renderRewardProgress(0, `Falha ao atualizar: ${err.message}`);
          setStatus(`Erro ao atualizar resgate: ${err.message}`, "danger");
        }
      }

      function scheduleRewardNameChange() {
        clearRewardTimers();

        rewardEditInProgress = true;
        rewardCountdownStartedAt = Date.now();

        renderRewardProgress(0, "Aguardando 10s sem digitar para aplicar...");

        rewardProgressIntervalId = setInterval(() => {
          const elapsed = Date.now() - rewardCountdownStartedAt;
          const percent = (elapsed / REWARD_APPLY_DELAY_MS) * 100;
          const remainingSec = Math.max(
            0,
            Math.ceil((REWARD_APPLY_DELAY_MS - elapsed) / 1000),
          );
          renderRewardProgress(
            percent,
            `Aplicando em ${remainingSec}s se nao houver nova digitacao`,
          );
        }, 100);

        rewardApplyTimeoutId = setTimeout(() => {
          applyRewardNameChange();
        }, REWARD_APPLY_DELAY_MS);
      }

      function updateStartStopButton(status) {
        const isRunning = Boolean(status?.running);

        btnStartStop.textContent = isRunning
          ? "Parar monitor"
          : "Iniciar monitor";
        btnStartStop.className = isRunning ? "btn-stop" : "btn-start";
        btnStartStop.dataset.action = isRunning ? "stop" : "start";
      }

      async function refreshStatus() {
        const res = await fetch("/api/twitch/status");
        const data = await res.json();

        fillFormFromStatus(data);
        updateStartStopButton(data);

        if (!data.envConfigured) {
          setStatus(
            "Configure TWITCH_CLIENT_ID e TWITCH_CLIENT_SECRET no cache inicial",
            "danger",
          );
          statusRaw.textContent = JSON.stringify(data, null, 2);
          return;
        }

        if (!data.auth) {
          setStatus("Nao conectado. Clique em Conectar Twitch", "warn");
          statusRaw.textContent = JSON.stringify(data, null, 2);
          return;
        }

        if (data.running) {
          setStatus("Monitor ativo", "ok");
        } else {
          setStatus("Monitor parado", "warn");
        }

        if (data.lastError) {
          setStatus(`Erro: ${data.lastError}`, "danger");
        }

        statusRaw.textContent = JSON.stringify(data, null, 2);
      }

      async function postJson(url, payload) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload || {}),
        });

        const data = await res.json();
        if (!res.ok || data.ok === false) {
          throw new Error(data.message || "Falha na requisicao");
        }

        return data;
      }

      btnStartStop.addEventListener("click", async () => {
        const action = btnStartStop.dataset.action || "start";

        try {
          if (action === "stop") {
            await postJson("/api/twitch/stop");
          } else {
            await postJson("/api/twitch/start", getPayload());
          }
          await refreshStatus();
        } catch (err) {
          const label = action === "stop" ? "parar" : "iniciar";
          setStatus(`Erro ao ${label}: ${err.message}`, "danger");
        }
      });

      document.getElementById("btnConnect").addEventListener("click", () => {
        window.location.href = "/api/twitch/connect";
      });

      document.getElementById("btnTest").addEventListener("click", async () => {
        try {
          await postJson("/api/twitch/test-trigger");
          setStatus("Gatilho de teste disparado no overlay", "ok");
          await refreshStatus();
        } catch (err) {
          setStatus(`Erro no teste: ${err.message}`, "danger");
        }
      });

      document
        .getElementById("btnLogout")
        .addEventListener("click", async () => {
          try {
            await postJson("/api/twitch/logout");
            await refreshStatus();
          } catch (err) {
            setStatus(`Erro no logout: ${err.message}`, "danger");
          }
        });

      rewardNameInput.addEventListener("input", () => {
        scheduleRewardNameChange();
      });
      rewardCostInput.addEventListener("input", () => {
        scheduleRewardNameChange();
      });
      rewardColorInput.addEventListener("input", () => {
        scheduleRewardNameChange();
      });

      rewardEnabledInput.addEventListener("change", async () => {
        const nextEnabled = rewardEnabledInput.checked;
        rewardToggleInProgress = true;
        setRewardEnabledUi(nextEnabled);

        try {
          await postJson("/api/twitch/reward-enabled", {
            enabled: nextEnabled,
          });
          setStatus(
            nextEnabled ? "Resgate ativado" : "Resgate desativado",
            "ok",
          );
          await refreshStatus();
        } catch (err) {
          setRewardEnabledUi(!nextEnabled);
          setStatus(
            `Erro ao alterar status do resgate: ${err.message}`,
            "danger",
          );
        } finally {
          rewardToggleInProgress = false;
        }
      });

      refreshStatus();
      setInterval(refreshStatus, 4000);
    </script>
  </body>
</html>
