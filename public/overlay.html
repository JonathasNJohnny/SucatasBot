<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Overlay Gacha</title>
    <link rel="stylesheet" href="/styles/overlay.css" />
  </head>

  <script>
    const socket = new WebSocket("ws://localhost:49382");
  </script>

  <body>
    <div class="overlay">
      <img class="pack" id="pack" src="/imgs/card/Package.png" />

      <div class="card" id="card">
        <img class="card-bg" src="/imgs/card/Photoroom.png" />
        <img class="card-item" id="img" />
        <div class="name" id="name"></div>
      </div>
    </div>

    <script>
      const gachaQueue = [];
      let isPlaying = false;
      const CARD_FADE_MS = 650;
      const NEXT_PACK_DELAY_MS = 1000;

      function sleep(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      async function processQueue() {
        if (isPlaying || gachaQueue.length === 0) {
          return;
        }

        isPlaying = true;

        while (gachaQueue.length > 0) {
          const nextDraw = gachaQueue.shift();
          await start(nextDraw.item, nextDraw.drawId);

          if (gachaQueue.length > 0) {
            await sleep(NEXT_PACK_DELAY_MS);
          }
        }

        isPlaying = false;
      }

      async function start(item, drawId) {
        const pack = document.getElementById("pack");
        const card = document.getElementById("card");
        const img = document.getElementById("img");
        const name = document.getElementById("name");

        img.src = item.image;
        // name.innerText = item.name;

        pack.style.transform = "scale(1)";
        pack.style.animation = "none";
        void pack.offsetWidth;
        pack.style.animation = "packSwing 0.9s ease-in-out";

        await sleep(1800);

        card.style.transform = "translateY(0) scale(1)";
        card.style.opacity = "1";

        await sleep(4000);

        // reset
        pack.style.transform = "scale(0)";
        card.style.transform = "translateY(50px) scale(0.8)";
        card.style.opacity = "0";

        await sleep(CARD_FADE_MS);

        // limpa o conteúdo da carta após sumir para evitar vazamento visual
        img.src = "";
        name.innerText = "";

        if (drawId && socket.readyState === WebSocket.OPEN) {
          socket.send(
            JSON.stringify({
              type: "gacha_animation_finished",
              drawId,
            }),
          );
        }
      }

      socket.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === "gacha") {
          gachaQueue.push({
            item: data.item,
            drawId: data.drawId || "",
          });
          processQueue();
        }
      };
    </script>
  </body>
</html>
