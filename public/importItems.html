<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ImportItems</title>
    <link rel="stylesheet" href="/styles/general.css" />
    <link rel="stylesheet" href="/styles/importItems.css" />
    <script src="/components/navbar/navbar-loader.js" defer></script>
  </head>
  <body>
    <div id="navbarMount"></div>

    <main class="wrap">
      <section class="panel">
        <h1>ImportItems</h1>
        <p>
          Cadastre os itens manualmente com nome, porcentagem e foto. Os dados
          ficam salvos em importedItems.txt (formato JSON) no servidor.
        </p>

        <div class="form-grid">
          <div class="field">
            <label for="itemName">Nome do item</label>
            <input id="itemName" type="text" placeholder="Ex.: Coelho Azul" />
          </div>

          <div class="field">
            <label for="itemChance">Porcentagem (%)</label>
            <input
              id="itemChance"
              type="number"
              min="0"
              step="0.01"
              placeholder="Ex.: 12.5"
            />
          </div>

          <div class="field">
            <label for="itemImage">Foto do item</label>
            <input id="itemImage" type="file" accept="image/*" />
          </div>
        </div>

        <div class="actions">
          <button id="btnImport" class="ok">Importar item</button>
          <button id="btnQuickImport">Importacao rapida</button>
        </div>

        <input
          id="quickImportImages"
          type="file"
          accept="image/*"
          multiple
          hidden
        />

        <div id="status" class="status">Aguardando acao...</div>
        <div id="itemsEditor" class="items-editor"></div>
      </section>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const itemsEditorEl = document.getElementById("itemsEditor");
      const btnImport = document.getElementById("btnImport");
      const btnQuickImport = document.getElementById("btnQuickImport");
      const itemNameEl = document.getElementById("itemName");
      const itemChanceEl = document.getElementById("itemChance");
      const itemImageEl = document.getElementById("itemImage");
      const quickImportImagesEl = document.getElementById("quickImportImages");
      const AUTO_SAVE_CHANCE_DELAY_MS = 700;

      function fileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = () => reject(new Error("Falha ao ler a imagem"));
          reader.readAsDataURL(file);
        });
      }

      function setStatus(text, ok = true) {
        statusEl.textContent = text;
        statusEl.className = `status ${ok ? "status-ok" : "status-error"}`;
      }

      function sha256HexFromArrayBuffer(buffer) {
        return crypto.subtle.digest("SHA-256", buffer).then((hashBuffer) => {
          return Array.from(new Uint8Array(hashBuffer))
            .map((byte) => byte.toString(16).padStart(2, "0"))
            .join("");
        });
      }

      function getMaxItemNumber(items) {
        return items.reduce((max, item) => {
          const match = String(item?.name || "")
            .trim()
            .match(/^item(\d+)/i);
          if (!match) return max;
          const parsed = Number.parseInt(match[1], 10);
          return Number.isFinite(parsed) ? Math.max(max, parsed) : max;
        }, 0);
      }

      async function getCurrentItems() {
        const res = await fetch("/api/items");
        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.message || "Falha ao consultar itens");
        }

        return Array.isArray(data.items) ? data.items : [];
      }

      async function buildImageHashMap(items) {
        const map = new Map();

        await Promise.all(
          items.map(async (item) => {
            try {
              const res = await fetch(item.image);
              if (!res.ok) return;

              const imageBuffer = await res.arrayBuffer();
              const hash = await sha256HexFromArrayBuffer(imageBuffer);
              if (!map.has(hash)) {
                map.set(hash, item);
              }
            } catch {
              // Ignora imagem que nao conseguiu baixar/hash.
            }
          }),
        );

        return map;
      }

      async function importSingleItem(payload) {
        const res = await fetch("/api/items/add", {
          method: "POST",
          headers: { "Content-Type": "application/json; charset=utf-8" },
          body: JSON.stringify(payload),
        });

        const data = await res.json();
        if (!res.ok || !data.ok) {
          throw new Error(data.message || "Falha ao importar item");
        }

        return data;
      }

      async function runQuickImport(fileList) {
        const files = Array.from(fileList || []);
        if (!files.length) {
          throw new Error("Selecione ao menos uma imagem para importar.");
        }

        const rawChance = parseFloat(String(itemChanceEl.value));
        const chance =
          Number.isFinite(rawChance) && rawChance > 0 ? rawChance : 100;

        const existingItems = await getCurrentItems();
        const imageHashMap = await buildImageHashMap(existingItems);

        let nextItemNumber = getMaxItemNumber(existingItems) + 1;
        let importedCount = 0;

        for (const file of files) {
          const fileHash = await sha256HexFromArrayBuffer(
            await file.arrayBuffer(),
          );
          const duplicatedFrom = imageHashMap.get(fileHash);

          const baseName = `item${nextItemNumber}`;
          const name = duplicatedFrom
            ? `${baseName} (repetido ${duplicatedFrom.name})`
            : baseName;

          const imageDataUrl = await fileToDataUrl(file);
          const result = await importSingleItem({
            name,
            chance,
            imageDataUrl,
          });

          importedCount += 1;
          nextItemNumber += 1;

          if (!imageHashMap.has(fileHash)) {
            imageHashMap.set(fileHash, result.item);
          }
        }

        return importedCount;
      }

      function createItemEditorRow(item) {
        const card = document.createElement("div");
        card.className = "item-card";
        card.innerHTML = `
          <div class="item-grid">
            <img class="item-preview" src="${item.image}" alt="${item.name}" />

            <div class="item-fields">
              <div class="field">
                <label>Nome</label>
                <input type="text" class="edit-name" value="${item.name}" />
              </div>

              <div class="field">
                <label>Porcentagem (%)</label>
                <input
                  type="number"
                  class="edit-chance"
                  min="0"
                  step="0.01"
                  value="${item.chance}"
                />
              </div>

              <div class="field">
                <label>Trocar foto (opcional)</label>
                <input type="file" class="edit-image" accept="image/*" />
              </div>
            </div>
          </div>

          <div class="actions">
            <button class="ok btn-save" data-id="${item.id}">Salvar alteracoes</button>
            <button class="ghost-danger btn-delete" data-id="${item.id}" title="Excluir item">&#128465; Excluir</button>
          </div>
        `;

        const saveButton = card.querySelector(".btn-save");
        const deleteButton = card.querySelector(".btn-delete");
        const nameInput = card.querySelector(".edit-name");
        const chanceInput = card.querySelector(".edit-chance");
        const imageInput = card.querySelector(".edit-image");
        const previewImage = card.querySelector(".item-preview");
        let autoSaveTimeoutId = null;
        let autoSavingChance = false;
        let lastSavedChance = Number.parseFloat(String(item.chance));

        async function updateItem(payload) {
          const res = await fetch("/api/items/update", {
            method: "POST",
            headers: { "Content-Type": "application/json; charset=utf-8" },
            body: JSON.stringify(payload),
          });

          const data = await res.json();
          if (!res.ok || !data.ok) {
            throw new Error(data.message || "Falha ao salvar item");
          }

          return data;
        }

        async function autoSaveChance(force = false) {
          const parsedChance = parseFloat(String(chanceInput.value));

          if (!Number.isFinite(parsedChance) || parsedChance <= 0) {
            if (force) {
              setStatus("Informe uma porcentagem maior que zero.", false);
            }
            return;
          }

          if (!force && parsedChance === lastSavedChance) {
            return;
          }

          if (autoSavingChance) {
            return;
          }

          autoSavingChance = true;

          try {
            const data = await updateItem({
              id: item.id,
              name: item.name,
              chance: parsedChance,
            });
            lastSavedChance = Number.parseFloat(String(data.item?.chance));
            item.chance = data.item?.chance;
            setStatus(`Porcentagem de "${item.name}" atualizada.`, true);
          } catch (err) {
            setStatus(err.message || "Erro ao atualizar porcentagem", false);
          } finally {
            autoSavingChance = false;
          }
        }

        imageInput.addEventListener("change", () => {
          const file = imageInput.files && imageInput.files[0];
          if (!file) return;
          previewImage.src = URL.createObjectURL(file);
        });

        chanceInput.addEventListener("input", () => {
          if (autoSaveTimeoutId) {
            clearTimeout(autoSaveTimeoutId);
          }

          autoSaveTimeoutId = setTimeout(() => {
            autoSaveChance();
          }, AUTO_SAVE_CHANCE_DELAY_MS);
        });

        chanceInput.addEventListener("blur", () => {
          if (autoSaveTimeoutId) {
            clearTimeout(autoSaveTimeoutId);
            autoSaveTimeoutId = null;
          }
          autoSaveChance(true);
        });

        saveButton.addEventListener("click", async () => {
          try {
            const name = nameInput.value.trim();
            const chance = parseFloat(String(chanceInput.value));
            const file = imageInput.files && imageInput.files[0];

            if (!name) {
              throw new Error("Informe o nome do item.");
            }

            if (!Number.isFinite(chance) || chance <= 0) {
              throw new Error("Informe uma porcentagem maior que zero.");
            }

            const payload = {
              id: item.id,
              name,
              chance,
            };

            if (file) {
              payload.imageDataUrl = await fileToDataUrl(file);
            }

            const data = await updateItem(payload);

            item.name = data.item.name;
            item.chance = data.item.chance;
            setStatus(`Item "${data.item.name}" atualizado.`, true);
            await loadItems();
          } catch (err) {
            setStatus(err.message || "Erro ao salvar alteracoes", false);
          }
        });

        deleteButton.addEventListener("click", async () => {
          try {
            const shouldDelete = confirm(
              `Excluir o item \"${item.name}\"? Esta acao nao pode ser desfeita.`,
            );

            if (!shouldDelete) return;

            const res = await fetch("/api/items/delete", {
              method: "POST",
              headers: { "Content-Type": "application/json; charset=utf-8" },
              body: JSON.stringify({ id: item.id }),
            });

            const data = await res.json();
            if (!res.ok || !data.ok) {
              throw new Error(data.message || "Falha ao excluir item");
            }

            setStatus(`Item \"${item.name}\" excluido.`, true);
            await loadItems();
          } catch (err) {
            setStatus(err.message || "Erro ao excluir item", false);
          }
        });

        return card;
      }

      function renderItemsEditor(items) {
        itemsEditorEl.innerHTML = "";

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "Nenhum item ativo no momento.";
          itemsEditorEl.appendChild(empty);
          return;
        }

        items.forEach((item) => {
          itemsEditorEl.appendChild(createItemEditorRow(item));
        });
      }

      btnImport.addEventListener("click", async () => {
        try {
          const name = itemNameEl.value.trim();
          const chance = parseFloat(String(itemChanceEl.value));
          const file = itemImageEl.files && itemImageEl.files[0];

          if (!name) {
            throw new Error("Informe o nome do item.");
          }

          if (!Number.isFinite(chance) || chance <= 0) {
            throw new Error("Informe uma porcentagem maior que zero.");
          }

          if (!file) {
            throw new Error("Selecione a foto do item.");
          }

          const imageDataUrl = await fileToDataUrl(file);
          const data = await importSingleItem({
            name,
            chance,
            imageDataUrl,
          });

          setStatus(
            `Item importado com sucesso. Total ativo: ${data.count}.`,
            true,
          );
          itemNameEl.value = "";
          itemChanceEl.value = "";
          itemImageEl.value = "";
          await loadItems();
        } catch (err) {
          setStatus(err.message || "Erro ao importar", false);
        }
      });

      btnQuickImport.addEventListener("click", () => {
        quickImportImagesEl.click();
      });

      quickImportImagesEl.addEventListener("change", async () => {
        try {
          const importedCount = await runQuickImport(quickImportImagesEl.files);
          setStatus(
            `Importacao rapida concluida. ${importedCount} item(ns) adicionados.`,
            true,
          );
          quickImportImagesEl.value = "";
          await loadItems();
        } catch (err) {
          setStatus(err.message || "Erro na importacao rapida", false);
          quickImportImagesEl.value = "";
        }
      });

      async function loadItems() {
        try {
          const res = await fetch("/api/items");
          const data = await res.json();
          if (!res.ok || !data.ok) {
            throw new Error(data.message || "Falha ao consultar servidor");
          }

          setStatus(
            `Servidor com ${data.count} item(ns) ativo(s). A porcentagem salva automaticamente.`,
            true,
          );
          renderItemsEditor(Array.isArray(data.items) ? data.items : []);
        } catch (err) {
          setStatus(err.message || "Erro ao consultar servidor", false);
          renderItemsEditor([]);
        }
      }

      loadItems();
    </script>
  </body>
</html>
