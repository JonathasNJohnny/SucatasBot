<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Controle</title>
    <link rel="stylesheet" href="/styles/general.css" />
    <link rel="stylesheet" href="/styles/controlPanel.css" />
    <script src="/components/navbar/navbar-loader.js" defer></script>
  </head>
  <body>
    <div id="navbarMount"></div>
    <main class="wrap">
      <section class="panel">
        <div class="panel-head">
          <h1>Painel de Controle</h1>
          <button
            class="btn-monitor"
            id="btnStartStop"
            type="button"
            aria-label="Iniciar monitor"
            title="Iniciar monitor"
          >
            ▶
          </button>
        </div>
        <p>Seja bem vindo(a): <span id="userName">Usuário</span></p>

        <div class="actions">
          <button class="btn-test" id="btnTest">Verificar Conexão</button>
          <button class="btn-stop" id="btnLogout">Sair</button>
        </div>

        <section class="shortcut-panel" aria-label="Atalhos globais de clipe">
          <h2>Atalhos globais para clipes do canal</h2>
          <p class="clip-note">
            Funcionam mesmo fora da tela do app. Clique no campo e aperte as
            teclas.
          </p>
          <div class="shortcut-list">
            <div class="shortcut-row" data-shortcut-key="clip30">
              <div class="shortcut-grid">
                <button
                  class="btn-clip"
                  type="button"
                  data-clip-duration="30"
                  aria-label="Criar clipe de 30 segundos"
                >
                  Clipar
                </button>
                <label for="shortcutClip30">Clipe 30s</label>
                <button
                  class="shortcut-reset-btn"
                  id="resetShortcutClip30"
                  type="button"
                  title="Voltar atalho de 30s para o padrão"
                  aria-label="Voltar atalho de 30 segundos para o padrão"
                >
                  ↻
                </button>
                <input
                  id="shortcutClip30"
                  class="shortcut-input"
                  type="text"
                  inputmode="none"
                  autocomplete="off"
                  readonly
                  value="Ctrl+Alt+1"
                  aria-label="Atalho global para clipe de 30 segundos"
                />
              </div>
              <div class="reward-progress-wrap shortcut-progress-wrap">
                <div class="reward-progress-bar">
                  <div
                    class="reward-progress-fill"
                    id="shortcutProgressFill30"
                  ></div>
                </div>
                <div class="reward-progress-text" id="shortcutProgressText30">
                  Digite para agendar salvamento em 3s
                </div>
              </div>
            </div>

            <div class="shortcut-row" data-shortcut-key="clip60">
              <div class="shortcut-grid">
                <button
                  class="btn-clip"
                  type="button"
                  data-clip-duration="60"
                  aria-label="Criar clipe de 60 segundos"
                >
                  Clipar
                </button>
                <label for="shortcutClip60">Clipe 60s</label>
                <button
                  class="shortcut-reset-btn"
                  id="resetShortcutClip60"
                  type="button"
                  title="Voltar atalho de 60s para o padrão"
                  aria-label="Voltar atalho de 60 segundos para o padrão"
                >
                  ↻
                </button>
                <input
                  id="shortcutClip60"
                  class="shortcut-input"
                  type="text"
                  inputmode="none"
                  autocomplete="off"
                  readonly
                  value="Ctrl+Alt+2"
                  aria-label="Atalho global para clipe de 60 segundos"
                />
              </div>
              <div class="reward-progress-wrap shortcut-progress-wrap">
                <div class="reward-progress-bar">
                  <div
                    class="reward-progress-fill"
                    id="shortcutProgressFill60"
                  ></div>
                </div>
                <div class="reward-progress-text" id="shortcutProgressText60">
                  Digite para agendar salvamento em 3s
                </div>
              </div>
            </div>
          </div>
        </section>

        <div class="status" id="statusBox">
          <div id="statusLine" class="warn">Carregando status...</div>
        </div>
      </section>
    </main>

    <script>
      const statusLine = document.getElementById("statusLine");
      const userName = document.getElementById("userName");
      const btnStartStop = document.getElementById("btnStartStop");
      const shortcutClip30Input = document.getElementById("shortcutClip30");
      const shortcutClip60Input = document.getElementById("shortcutClip60");
      const resetShortcutClip30Btn = document.getElementById(
        "resetShortcutClip30",
      );
      const resetShortcutClip60Btn = document.getElementById(
        "resetShortcutClip60",
      );
      const shortcutProgressFill30 = document.getElementById(
        "shortcutProgressFill30",
      );
      const shortcutProgressFill60 = document.getElementById(
        "shortcutProgressFill60",
      );
      const shortcutProgressText30 = document.getElementById(
        "shortcutProgressText30",
      );
      const shortcutProgressText60 = document.getElementById(
        "shortcutProgressText60",
      );
      const clipButtons = Array.from(
        document.querySelectorAll("[data-clip-duration]"),
      );
      const DISCONNECTED_SHAKE_CLASS = "is-disconnected-attempt";
      const SHORTCUT_APPLY_DELAY_MS = 3000;
      const DEFAULT_SHORTCUTS = {
        clip30: "Ctrl+Alt+1",
        clip60: "Ctrl+Alt+2",
      };
      let autoStartInFlight = false;
      let clipRequestInFlight = false;
      let shortcutsInFlight = false;
      const shortcutSaveQueuedKeys = new Set();
      let focusedShortcutInputCount = 0;
      const shortcutAutoSaveState = {
        clip30: {
          timeoutId: null,
          intervalId: null,
          countdownStartedAt: 0,
          fillEl: shortcutProgressFill30,
          textEl: shortcutProgressText30,
        },
        clip60: {
          timeoutId: null,
          intervalId: null,
          countdownStartedAt: 0,
          fillEl: shortcutProgressFill60,
          textEl: shortcutProgressText60,
        },
      };
      const shortcutInputByKey = {
        clip30: shortcutClip30Input,
        clip60: shortcutClip60Input,
      };

      function setStatus(text, cls) {
        statusLine.className = cls;
        statusLine.textContent = text;
      }

      function getPayload(options = {}) {
        return {
          forceNonAffiliate: Boolean(options.forceNonAffiliate),
        };
      }

      function hasTwitchAuth(status) {
        return Boolean(status?.auth?.broadcasterId);
      }

      async function fetchTwitchStatus() {
        const res = await fetch("/api/twitch/status");
        return res.json();
      }

      function playDisconnectedAttemptAnimation() {
        btnStartStop.classList.remove(DISCONNECTED_SHAKE_CLASS);
        // Reinicia a animacao ao clicar repetidamente.
        void btnStartStop.offsetWidth;
        btnStartStop.classList.add(DISCONNECTED_SHAKE_CLASS);
      }

      btnStartStop.addEventListener("animationend", (event) => {
        if (event.animationName === "monitor-disconnected-shake") {
          btnStartStop.classList.remove(DISCONNECTED_SHAKE_CLASS);
        }
      });

      function updateStartStopButton(status) {
        const isRunning = Boolean(status?.running);

        btnStartStop.textContent = isRunning ? "⏹" : "▶";
        btnStartStop.classList.toggle("stop", isRunning);
        btnStartStop.dataset.action = isRunning ? "stop" : "start";
        btnStartStop.title = isRunning ? "Parar monitor" : "Iniciar monitor";
        btnStartStop.setAttribute(
          "aria-label",
          isRunning ? "Parar monitor" : "Iniciar monitor",
        );
      }

      async function refreshStatus() {
        const data = await fetchTwitchStatus();
        userName.textContent =
          data?.auth?.displayName || data?.auth?.login || "Usuário";

        updateStartStopButton(data);

        if (!data.envConfigured) {
          setStatus(
            "Configure TWITCH_CLIENT_ID e TWITCH_CLIENT_SECRET no cache inicial",
            "danger",
          );
          return;
        }

        if (!data.auth) {
          setStatus("Nao conectado. Clique em Conectar Twitch", "warn");
          return;
        }

        if (data.running) {
          setStatus("Monitor ativo", "ok");
        } else {
          setStatus("Monitor parado", "warn");
        }

        if (data.lastError) {
          const isAffiliateError =
            data.lastError &&
            String(data.lastError)
              .toLowerCase()
              .includes("partner or affiliate");
          if (isAffiliateError) {
            setStatus("Monitor ativo - (não afiliado)", "ok");
          } else {
            setStatus(`Erro: ${data.lastError}`, "danger");
          }
        }

        return data;
      }

      async function ensureAutoStart(reason = "load") {
        if (autoStartInFlight) return;
        autoStartInFlight = true;

        try {
          const currentStatus = await refreshStatus();
          if (!hasTwitchAuth(currentStatus) || currentStatus.running) {
            return;
          }

          await postJson("/api/twitch/start", getPayload());
          await refreshStatus();
        } catch (err) {
          setStatus(
            `Erro ao iniciar automaticamente (${reason}): ${err.message}`,
            "danger",
          );
        } finally {
          autoStartInFlight = false;
        }
      }

      async function postJson(url, payload) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload || {}),
        });

        const data = await res.json();
        if (!res.ok || data.ok === false) {
          throw new Error(data.message || "Falha na requisicao");
        }

        return data;
      }

      function setClipButtonsDisabled(disabled) {
        clipButtons.forEach((button) => {
          button.disabled = disabled;
        });
      }

      function normalizeShortcutDisplayToken(token) {
        const raw = String(token || "").trim();
        if (!raw) return "";

        const lower = raw.toLowerCase();
        if (raw === "¹") return "1";
        if (raw === "²") return "2";
        if (raw === "³") return "3";
        if (lower === "control" || lower === "ctrl") return "Ctrl";
        if (lower === "alt" || lower === "option") return "Alt";
        if (lower === "shift") return "Shift";
        if (lower === "meta" || lower === "super" || lower === "win") {
          return "Super";
        }
        if (lower === "command" || lower === "cmd") return "Command";
        if (lower === "commandorcontrol" || lower === "cmdorctrl") {
          return "CommandOrControl";
        }
        if (raw.length === 1) return raw.toUpperCase();
        return raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase();
      }

      function normalizeShortcutString(shortcut) {
        const raw = String(shortcut || "").trim();
        if (!raw) return "";

        const tokens = raw
          .split("+")
          .map((token) => normalizeShortcutDisplayToken(token))
          .filter(Boolean);

        if (!tokens.length) return "";
        const keyToken = tokens[tokens.length - 1];
        const modifiers = tokens.slice(0, -1);
        const orderedModifiers = [
          "Ctrl",
          "Alt",
          "Shift",
          "Super",
          "Command",
          "CommandOrControl",
        ].filter((modifier) => modifiers.includes(modifier));

        return orderedModifiers.length
          ? `${orderedModifiers.join("+")}+${keyToken}`
          : keyToken;
      }

      function getCapturedShortcutFromEvent(event) {
        const ignoredKeys = ["Control", "Shift", "Alt", "Meta"];
        if (ignoredKeys.includes(event.key)) {
          return "";
        }

        const modifiers = [];
        if (event.ctrlKey) modifiers.push("Ctrl");
        if (event.altKey) modifiers.push("Alt");
        if (event.shiftKey) modifiers.push("Shift");
        if (event.metaKey) modifiers.push("Super");

        const code = String(event.code || "");
        let key = "";

        if (/^Digit\d$/.test(code)) {
          key = code.slice(-1);
        } else if (/^Numpad\d$/.test(code)) {
          key = code.slice(-1);
        } else if (/^Key[A-Z]$/.test(code)) {
          key = code.slice(-1);
        } else if (/^F\d{1,2}$/.test(code)) {
          key = code;
        } else {
          key = event.key;
          if (key === " ") key = "Space";
          if (key.startsWith("Arrow")) key = key.replace("Arrow", "");
        }

        key = normalizeShortcutDisplayToken(key);

        if (!key) return "";
        return modifiers.length ? `${modifiers.join("+")}+${key}` : key;
      }

      function resetShortcutToDefault(shortcutKey) {
        const input = shortcutInputByKey[shortcutKey];
        const defaultValue = DEFAULT_SHORTCUTS[shortcutKey];
        if (!input || !defaultValue) {
          return;
        }

        input.value = defaultValue;
        scheduleShortcutAutoSave(shortcutKey);
      }

      function attachShortcutCapture(input, shortcutKey) {
        input.addEventListener("keydown", (event) => {
          event.preventDefault();
          const captured = getCapturedShortcutFromEvent(event);
          if (!captured) return;
          input.value = captured;
          scheduleShortcutAutoSave(shortcutKey);
        });

        input.addEventListener("focus", () => {
          focusedShortcutInputCount += 1;
          void setGlobalClipShortcutsEnabled(false);
        });

        input.addEventListener("blur", () => {
          focusedShortcutInputCount = Math.max(
            0,
            focusedShortcutInputCount - 1,
          );
          if (focusedShortcutInputCount === 0) {
            void setGlobalClipShortcutsEnabled(true);
          }
        });

        input.addEventListener("click", () => {
          input.focus();
          input.select();
        });
      }

      function clearShortcutTimers(shortcutKey) {
        const state = shortcutAutoSaveState[shortcutKey];
        if (!state) return;

        if (state.timeoutId) {
          clearTimeout(state.timeoutId);
          state.timeoutId = null;
        }

        if (state.intervalId) {
          clearInterval(state.intervalId);
          state.intervalId = null;
        }
      }

      function renderShortcutProgress(shortcutKey, percent, text) {
        const state = shortcutAutoSaveState[shortcutKey];
        if (!state) return;

        const clamped = Math.max(0, Math.min(100, Number(percent) || 0));
        state.fillEl.style.width = `${clamped}%`;
        state.textEl.textContent = text;
      }

      function scheduleShortcutAutoSave(shortcutKey) {
        const state = shortcutAutoSaveState[shortcutKey];
        if (!state) return;

        clearShortcutTimers(shortcutKey);
        state.countdownStartedAt = Date.now();

        renderShortcutProgress(
          shortcutKey,
          0,
          "Aguardando 3s sem digitar para salvar...",
        );

        state.intervalId = setInterval(() => {
          const elapsed = Date.now() - state.countdownStartedAt;
          const percent = (elapsed / SHORTCUT_APPLY_DELAY_MS) * 100;
          const remainingSec = Math.max(
            0,
            Math.ceil((SHORTCUT_APPLY_DELAY_MS - elapsed) / 1000),
          );
          renderShortcutProgress(
            shortcutKey,
            percent,
            `Salvando em ${remainingSec}s se nao houver nova digitacao`,
          );
        }, 100);

        state.timeoutId = setTimeout(() => {
          void saveGlobalShortcutsToElectron(shortcutKey);
        }, SHORTCUT_APPLY_DELAY_MS);
      }

      async function setGlobalClipShortcutsEnabled(enabled) {
        if (!window.electron?.setClipShortcutsEnabled) {
          return;
        }

        try {
          await window.electron.setClipShortcutsEnabled(Boolean(enabled));
        } catch (err) {
          console.warn("Nao foi possivel alternar atalhos globais:", err);
        }
      }

      function getShortcutPayload() {
        return {
          clip30: normalizeShortcutString(shortcutClip30Input.value),
          clip60: normalizeShortcutString(shortcutClip60Input.value),
        };
      }

      function applyShortcutsToInputs(shortcuts) {
        const resolved = {
          clip30:
            normalizeShortcutString(shortcuts?.clip30) ||
            DEFAULT_SHORTCUTS.clip30,
          clip60:
            normalizeShortcutString(shortcuts?.clip60) ||
            DEFAULT_SHORTCUTS.clip60,
        };

        shortcutClip30Input.value = resolved.clip30;
        shortcutClip60Input.value = resolved.clip60;
      }

      async function loadGlobalShortcutsFromElectron() {
        if (!window.electron?.getClipShortcuts) {
          return;
        }

        try {
          const result = await window.electron.getClipShortcuts();
          applyShortcutsToInputs(result?.shortcuts);
        } catch (err) {
          setStatus(
            `Nao foi possivel carregar atalhos: ${err.message}`,
            "warn",
          );
        }
      }

      async function saveGlobalShortcutsToElectron(sourceKey) {
        if (shortcutsInFlight) {
          if (sourceKey) {
            shortcutSaveQueuedKeys.add(sourceKey);
          }
          return;
        }

        if (!window.electron?.saveClipShortcuts) {
          setStatus(
            "Atalhos globais indisponiveis nesta execucao do app.",
            "warn",
          );
          if (sourceKey) {
            renderShortcutProgress(
              sourceKey,
              0,
              "Atalhos globais indisponiveis.",
            );
          }
          return;
        }

        if (sourceKey) {
          clearShortcutTimers(sourceKey);
        }
        shortcutsInFlight = true;

        try {
          const payload = getShortcutPayload();
          const result = await window.electron.saveClipShortcuts(payload);
          if (!result?.ok) {
            throw new Error(result?.message || "Falha ao salvar atalhos");
          }

          applyShortcutsToInputs(result.shortcuts);
          await setGlobalClipShortcutsEnabled(true);

          const failed = Array.isArray(result.failed) ? result.failed : [];
          if (sourceKey) {
            renderShortcutProgress(
              sourceKey,
              0,
              failed.length
                ? "Salvo, mas o sistema nao registrou este atalho."
                : "Atalho salvo automaticamente.",
            );
          }

          if (failed.length) {
            setStatus(
              `Atalhos salvos, mas alguns nao puderam ser registrados: ${failed.join(", ")}`,
              "warn",
            );
          } else {
            setStatus("Atalhos globais salvos com sucesso.", "ok");
          }
        } catch (err) {
          if (sourceKey) {
            renderShortcutProgress(
              sourceKey,
              0,
              `Falha ao salvar: ${err.message}`,
            );
          }
          setStatus(`Erro ao salvar atalhos: ${err.message}`, "danger");
        } finally {
          shortcutsInFlight = false;
          if (shortcutSaveQueuedKeys.size) {
            const queuedKeys = Array.from(shortcutSaveQueuedKeys);
            shortcutSaveQueuedKeys.clear();
            queuedKeys.forEach((queuedKey) => {
              scheduleShortcutAutoSave(queuedKey);
            });
          }
        }
      }

      async function createClip(requestedDuration) {
        if (clipRequestInFlight) return;

        clipRequestInFlight = true;
        setClipButtonsDisabled(true);

        try {
          const currentStatus = await fetchTwitchStatus();
          if (!hasTwitchAuth(currentStatus)) {
            setStatus("Nao conectado. Clique em Conectar Twitch", "danger");
            await refreshStatus();
            return;
          }

          const response = await postJson("/api/twitch/clip", {
            duration: Number(requestedDuration) || 30,
            title: `Clipe ${requestedDuration}s`,
          });

          const createdId = response.clipId ? ` ID: ${response.clipId}.` : "";
          setStatus(
            `${response.message || "Clipe iniciado"}${createdId}`,
            "ok",
          );
        } catch (err) {
          setStatus(`Erro ao criar clipe: ${err.message}`, "danger");
        } finally {
          clipRequestInFlight = false;
          setClipButtonsDisabled(false);
        }
      }

      btnStartStop.addEventListener("click", async (event) => {
        const action = btnStartStop.dataset.action || "start";

        try {
          if (action === "stop") {
            await postJson("/api/twitch/stop");
          } else {
            const currentStatus = await fetchTwitchStatus();
            if (!hasTwitchAuth(currentStatus)) {
              playDisconnectedAttemptAnimation();
              setStatus("Nao conectado. Clique em Conectar Twitch", "danger");
              await refreshStatus();
              return;
            }
            const forceNonAffiliate =
              Boolean(event?.ctrlKey) && Boolean(event?.altKey);
            await postJson(
              "/api/twitch/start",
              getPayload({ forceNonAffiliate }),
            );
          }
          await refreshStatus();

          if (typeof refreshNavbarTwitchIdentity === "function") {
            await refreshNavbarTwitchIdentity();
          }
        } catch (err) {
          const label = action === "stop" ? "parar" : "iniciar";
          setStatus(`Erro ao ${label}: ${err.message}`, "danger");
        }
      });

      document.getElementById("btnTest").addEventListener("click", async () => {
        try {
          const currentStatus = await fetchTwitchStatus();
          const isRunning = Boolean(currentStatus?.running);
          const chatMessage = isRunning
            ? "conectado e rodando"
            : "conectado e pausado";

          await postJson("/api/twitch/test-chat", { message: chatMessage });
          setStatus(`Mensagem enviada no chat: ${chatMessage}`, "ok");
          await refreshStatus();
        } catch (err) {
          setStatus(`Erro no teste: ${err.message}`, "danger");
        }
      });

      clipButtons.forEach((button) => {
        button.addEventListener("click", async () => {
          await createClip(button.dataset.clipDuration);
        });
      });

      attachShortcutCapture(shortcutClip30Input, "clip30");
      attachShortcutCapture(shortcutClip60Input, "clip60");

      resetShortcutClip30Btn.addEventListener("click", () => {
        resetShortcutToDefault("clip30");
      });

      resetShortcutClip60Btn.addEventListener("click", () => {
        resetShortcutToDefault("clip60");
      });

      document
        .getElementById("btnLogout")
        .addEventListener("click", async () => {
          try {
            await postJson("/api/twitch/logout");
            await refreshStatus();
            if (typeof window.refreshNavbarTwitchIdentity === "function") {
              await window.refreshNavbarTwitchIdentity();
            }
            window.dispatchEvent(new Event("twitch-auth-changed"));
          } catch (err) {
            setStatus(`Erro no logout: ${err.message}`, "danger");
          }
        });

      ensureAutoStart("load");
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          ensureAutoStart("visibility");
        }
      });
      window.addEventListener("focus", () => {
        ensureAutoStart("focus");
      });
      window.addEventListener("pageshow", () => {
        ensureAutoStart("pageshow");
      });
      window.addEventListener("twitch-auth-changed", () => {
        ensureAutoStart("auth-changed");
      });

      loadGlobalShortcutsFromElectron();
      setInterval(refreshStatus, 4000);
    </script>
  </body>
</html>
