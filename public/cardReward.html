<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recompensa das Cartas</title>
    <link rel="stylesheet" href="/styles/general.css" />
    <link rel="stylesheet" href="/styles/twitchControl.css" />
    <script src="/components/navbar/navbar-loader.js" defer></script>
  </head>
  <body>
    <div id="navbarMount"></div>
    <main class="wrap">
      <section class="panel">
        <h1>Recompensa das Cartas</h1>
        <p>Configure o resgate usado para abrir cartas.</p>
        <p class="obs-link-row">
          <span
            >Link para OBS: "<span id="obsLinkText"
              >http://localhost:49382/overlay</span
            >".</span
          >
          <button
            id="btnCopyObsLink"
            class="copy-obs-btn"
            type="button"
            aria-label="Copiar link do OBS"
            title="Copiar link do OBS"
          >
            <span id="copyObsIcon" aria-hidden="true">⎙</span>
          </button>
        </p>

        <div class="grid">
          <div>
            <label for="rewardName">Nome do resgate</label>
            <input id="rewardName" value="-" />
            <div class="reward-progress-wrap">
              <div class="reward-progress-bar">
                <div class="reward-progress-fill" id="rewardProgressFill"></div>
              </div>
              <div class="reward-progress-text" id="rewardProgressText">
                Digite para agendar atualizacao em 10s
              </div>
            </div>
          </div>
          <div>
            <label for="rewardCost">Pontos do resgate</label>
            <input id="rewardCost" type="number" min="1" step="1" value="1" />
          </div>
          <div>
            <label for="rewardColor">Cor do resgate</label>
            <input id="rewardColor" type="color" value="#9147ff" />
          </div>
          <div>
            <label for="rewardEnabled">Status do resgate</label>
            <div class="switch-row">
              <label class="switch" aria-label="Ativar ou desativar resgate">
                <input id="rewardEnabled" type="checkbox" checked />
                <span class="slider"></span>
              </label>
              <span class="switch-state" id="rewardEnabledText">ON</span>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn-test" id="btnTestOverlay">Testar overlay</button>
          <button class="btn-test" id="btnTestTrigger">Teste de gatilho</button>
        </div>

        <section class="redemptions-section" aria-label="Historico de resgates">
          <h2>Resgates Realizados</h2>
          <ul id="redemptionsList" class="redemptions-list">
            <li class="redemptions-empty">Carregando resgates...</li>
          </ul>
        </section>
      </section>
    </main>

    <script>
      const rewardNameInput = document.getElementById("rewardName");
      const rewardCostInput = document.getElementById("rewardCost");
      const rewardColorInput = document.getElementById("rewardColor");
      const rewardEnabledInput = document.getElementById("rewardEnabled");
      const rewardEnabledText = document.getElementById("rewardEnabledText");
      const rewardProgressFill = document.getElementById("rewardProgressFill");
      const rewardProgressText = document.getElementById("rewardProgressText");
      const redemptionsList = document.getElementById("redemptionsList");
      const obsLinkText = document.getElementById("obsLinkText");
      const btnCopyObsLink = document.getElementById("btnCopyObsLink");
      const copyObsIcon = document.getElementById("copyObsIcon");

      const REWARD_APPLY_DELAY_MS = 10000;
      let rewardApplyTimeoutId = null;
      let rewardProgressIntervalId = null;
      let rewardCountdownStartedAt = 0;
      let rewardEditInProgress = false;
      let rewardToggleInProgress = false;

      function getPayload() {
        return {
          rewardName: rewardNameInput.value.trim(),
          rewardCost: rewardCostInput.value,
          rewardColor: rewardColorInput.value,
          rewardEnabled: rewardEnabledInput.checked,
        };
      }

      function setRewardEnabledUi(enabled) {
        rewardEnabledInput.checked = Boolean(enabled);
        rewardEnabledText.textContent = enabled ? "ON" : "OFF";
      }

      function fillFormFromStatus(status) {
        if (!status) return;

        if (!rewardEditInProgress) {
          rewardNameInput.value = status.redemptionName || "-";
          rewardCostInput.value = String(status.rewardCost || 1);
          rewardColorInput.value = status.rewardColor || "#9147ff";
          if (!rewardToggleInProgress) {
            setRewardEnabledUi(Boolean(status.rewardEnabled));
          }
        }
      }

      function clearRewardTimers() {
        if (rewardApplyTimeoutId) {
          clearTimeout(rewardApplyTimeoutId);
          rewardApplyTimeoutId = null;
        }

        if (rewardProgressIntervalId) {
          clearInterval(rewardProgressIntervalId);
          rewardProgressIntervalId = null;
        }
      }

      function renderRewardProgress(percent, text) {
        const clamped = Math.max(0, Math.min(100, percent));
        rewardProgressFill.style.width = `${clamped}%`;
        rewardProgressText.textContent = text;
      }

      async function applyRewardNameChange() {
        clearRewardTimers();

        const rewardName = rewardNameInput.value.trim();
        const rewardCost = rewardCostInput.value;
        const rewardColor = rewardColorInput.value;
        const rewardEnabled = rewardEnabledInput.checked;
        if (!rewardName || rewardName === "-") {
          renderRewardProgress(0, "Digite um nome valido para o resgate");
          rewardEditInProgress = false;
          return;
        }

        try {
          renderRewardProgress(100, "Aplicando novo resgate...");
          await postJson("/api/twitch/reward-config", {
            rewardName,
            rewardCost,
            rewardColor,
            rewardEnabled,
          });
          rewardEditInProgress = false;
          renderRewardProgress(
            0,
            "Atualizado. Digite para agendar nova alteracao",
          );
          await refreshStatus();
        } catch (err) {
          rewardEditInProgress = false;
          renderRewardProgress(0, `Falha ao atualizar: ${err.message}`);
        }
      }

      function scheduleRewardNameChange() {
        clearRewardTimers();

        rewardEditInProgress = true;
        rewardCountdownStartedAt = Date.now();

        renderRewardProgress(0, "Aguardando 10s sem digitar para aplicar...");

        rewardProgressIntervalId = setInterval(() => {
          const elapsed = Date.now() - rewardCountdownStartedAt;
          const percent = (elapsed / REWARD_APPLY_DELAY_MS) * 100;
          const remainingSec = Math.max(
            0,
            Math.ceil((REWARD_APPLY_DELAY_MS - elapsed) / 1000),
          );
          renderRewardProgress(
            percent,
            `Aplicando em ${remainingSec}s se nao houver nova digitacao`,
          );
        }, 100);

        rewardApplyTimeoutId = setTimeout(() => {
          applyRewardNameChange();
        }, REWARD_APPLY_DELAY_MS);
      }

      async function refreshStatus() {
        const res = await fetch("/api/twitch/status");
        const data = await res.json();

        fillFormFromStatus(data);
        await refreshRedemptionsList();
      }

      function renderRedemptionsList(entries) {
        if (!Array.isArray(entries) || entries.length === 0) {
          redemptionsList.innerHTML =
            '<li class="redemptions-empty">Nenhum resgate registrado ainda.</li>';
          return;
        }

        redemptionsList.innerHTML = entries
          .map((entry) => {
            const date = String(entry?.date || "").trim();
            const time = String(entry?.time || "").trim();
            const user = String(entry?.user || "desconhecido").trim();
            const item = String(entry?.item || "desconhecido").trim();
            return `<li>${date} ${time} ${user} - ${item}</li>`;
          })
          .join("");
      }

      async function refreshRedemptionsList() {
        try {
          const res = await fetch("/api/twitch/redemptions-log", {
            cache: "no-store",
          });
          const data = await res.json();
          if (!res.ok || data.ok === false) {
            throw new Error(data.message || "Erro ao carregar resgates");
          }

          renderRedemptionsList(data.entries || []);
        } catch {
          redemptionsList.innerHTML =
            '<li class="redemptions-empty">Nao foi possivel carregar os resgates.</li>';
        }
      }

      async function postJson(url, payload) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload || {}),
        });

        const data = await res.json();
        if (!res.ok || data.ok === false) {
          throw new Error(data.message || "Falha na requisicao");
        }

        return data;
      }

      document
        .getElementById("btnTestOverlay")
        .addEventListener("click", () => {
          window.open("/overlay.html", "_blank");
        });

      btnCopyObsLink.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(
            String(obsLinkText?.textContent || "").trim(),
          );
          copyObsIcon.textContent = "✓";
          btnCopyObsLink.title = "Copiado";
          btnCopyObsLink.setAttribute("aria-label", "Copiado");
        } catch {
          copyObsIcon.textContent = "!";
          btnCopyObsLink.title = "Falha ao copiar";
          btnCopyObsLink.setAttribute("aria-label", "Falha ao copiar");
        }
      });

      document
        .getElementById("btnTestTrigger")
        .addEventListener("click", async () => {
          try {
            await postJson("/api/twitch/test-trigger");
            renderRewardProgress(0, "Gatilho de teste disparado no overlay");
            await refreshStatus();
          } catch (err) {
            renderRewardProgress(0, `Erro no teste: ${err.message}`);
          }
        });

      rewardNameInput.addEventListener("input", () => {
        scheduleRewardNameChange();
      });
      rewardCostInput.addEventListener("input", () => {
        scheduleRewardNameChange();
      });
      rewardColorInput.addEventListener("input", () => {
        scheduleRewardNameChange();
      });

      rewardEnabledInput.addEventListener("change", async () => {
        const nextEnabled = rewardEnabledInput.checked;
        rewardToggleInProgress = true;
        setRewardEnabledUi(nextEnabled);

        try {
          await postJson("/api/twitch/reward-enabled", {
            enabled: nextEnabled,
          });
          await refreshStatus();
        } catch (err) {
          setRewardEnabledUi(!nextEnabled);
          renderRewardProgress(
            0,
            `Erro ao alterar status do resgate: ${err.message}`,
          );
        } finally {
          rewardToggleInProgress = false;
        }
      });

      refreshStatus();
      setInterval(refreshStatus, 4000);
    </script>
  </body>
</html>
