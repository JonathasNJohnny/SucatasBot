<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Callback Twitch</title>
    <style>
      :root {
        --bg: #0d1226;
        --card: #141c38;
        --line: #2f3f76;
        --text: #f2f6ff;
        --ok: #2ed69b;
        --error: #ff6d7a;
      }

      * {
        box-sizing: border-box;
      }

      /* Navbar Styles */
      .navbar {
        background: rgba(11, 16, 32, 0.95);
        border-bottom: 2px solid #2a365f;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      .navbar-brand {
        font-size: 1.3rem;
        font-weight: bold;
        background: linear-gradient(135deg, #3ad88f 0%, #60f0ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .navbar-links {
        display: flex;
        gap: 1.5rem;
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .navbar-links a {
        color: #9aa6d1;
        text-decoration: none;
        font-weight: 500;
        transition: all 0.3s ease;
      }
      .navbar-links a:hover {
        color: #3ad88f;
      }
      .navbar-links a.active {
        color: #3ad88f;
        border-bottom: 2px solid #3ad88f;
        padding-bottom: 0.5rem;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1f2d5e 0%, var(--bg) 55%);
        color: var(--text);
        font-family:
          Segoe UI,
          Tahoma,
          Geneva,
          Verdana,
          sans-serif;
      }

      .card {
        width: min(92vw, 520px);
        border: 1px solid var(--line);
        border-radius: 16px;
        background: linear-gradient(180deg, #1a2448 0%, var(--card) 100%);
        padding: 24px;
        text-align: center;
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      .success {
        color: var(--ok);
      }

      .error {
        color: var(--error);
      }

      button {
        margin-top: 18px;
        border: 0;
        border-radius: 10px;
        background: #3e63dd;
        color: #fff;
        font-weight: 700;
        padding: 11px 18px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-brand">🎁 Lizah</div>
      <ul class="navbar-links">
        <li><a href="/importItems.html">ImportItems</a></li>
        <li><a href="/control.html">Controle</a></li>
        <li><a href="/twitchControl.html">Twitch</a></li>
        <li><a href="/overlay.html" target="_blank">Overlay</a></li>
      </ul>
    </nav>
    <main class="card">
      <h1 id="title">Processando...</h1>
      <p id="message"></p>
      <button id="okBtn">OK</button>
    </main>

    <script>
      const title = document.getElementById("title");
      const message = document.getElementById("message");
      const okBtn = document.getElementById("okBtn");

      const params = new URLSearchParams(window.location.search);
      const status = params.get("status") || "error";

      if (status === "success") {
        title.textContent = "Conectado com sucesso";
        title.className = "success";
        message.textContent =
          "Sua conta da Twitch foi conectada. Clique em OK para voltar ao painel.";
      } else {
        title.textContent = "Falha ao conectar";
        title.className = "error";
        message.textContent =
          "Nao foi possivel concluir a conexao com a Twitch. Clique em OK para voltar e tentar novamente.";
      }

      okBtn.addEventListener("click", () => {
        window.location.href = "/twitchControl.html";
      });
    </script>
  </body>
</html>
